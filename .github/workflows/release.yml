name: Build and Release Midnight Launcher

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    env:
      WIX_ACCEPT_OSMF_EULA: 'yes'

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 9.0.x

    - name: Cache NuGet packages
      uses: actions/cache@v4
      with:
        path: ~/.nuget/packages
        key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
        restore-keys: |
          ${{ runner.os }}-nuget-
        
    - name: Restore dependencies
      run: dotnet restore
      
    - name: Publish Win-x64
      run: dotnet publish -c Release -r win-x64 --self-contained true -p:PublishSingleFile=true -o ./publish/win-x64
      
    - name: Install WiX
      run: dotnet tool install --global wix || echo "WiX installation failed, skipping MSI."
      continue-on-error: true
        
    - name: Create MSI
      id: create_msi
      run: wix build MidnightLauncher.wxs -o MidnightLauncher.msi
      continue-on-error: true
      
    - name: Create ZIP Fallback
      run: |
        Compress-Archive -Path ./publish/win-x64/* -DestinationPath MidnightLauncher-win-x64.zip
      shell: pwsh

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          MidnightLauncher.msi
          MidnightLauncher-win-x64.zip
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
